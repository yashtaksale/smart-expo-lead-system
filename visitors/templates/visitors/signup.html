<!doctype html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Single Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 520px;">

        <h2 class="text-center mb-3">Single Entry</h2>

        <div class="alert alert-info text-center fw-bold">
            Total Visitors Signed In: {{ total_count }}
        </div>

        <form method="post">
    {% csrf_token %}

    <label class="form-label fw-bold">Your Name</label>
    {{ form.name }}

    <label class="form-label fw-bold mt-3">Phone</label>
    {{ form.phone }}

    <label class="form-label fw-bold mt-3">Company</label>
    {{ form.company }}

    <label class="form-label fw-bold mt-3">Email</label>
    {{ form.email }}

    <label class="form-label fw-bold mt-3">Message</label>
    {{ form.message }}

    <label class="form-label fw-bold mt-3">Category</label>
    {{ form.category }}

    <label class="form-label fw-bold mt-3">Lead Score</label>
    {{ form.lead_score }}

    <button type="submit" class="btn btn-primary w-100 mt-3">
        Submit
    </button>
</form>


        <a href="{% url 'entry-mode' %}" class="btn btn-secondary w-100 mt-3">
            Back to Entry Mode
        </a>

    </div>
</div>

</body>
</html>
