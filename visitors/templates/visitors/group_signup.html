<!doctype html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Group Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">
<div class="container" style="max-width: 450px;">
    <div class="card shadow p-4 mt-4">

        <h3 class="text-center mb-3">Group Entry</h3>

        <form method="POST">
            {% csrf_token %}
            <label class="form-label fw-bold">Enter Group Name</label>
            <input type="text" name="group_name" class="form-control" required>

            <button class="btn btn-primary w-100 mt-3">Continue</button>
        </form>

        <a href="{% url 'entry-mode' %}" class="btn btn-secondary w-100 mt-3">Back</a>
    </div>
</div>
</body>
</html>
