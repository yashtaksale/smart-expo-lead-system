<!doctype html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Group Members</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 520px;">

        <h2 class="text-center mb-3">Group: {{ group_name }}</h2>

        <h5 class="fw-bold">Members Added:</h5>

        <ul class="list-group mb-3">
            {% for m in members %}
                <li class="list-group-item">
                    <b>{{ m.name }}</b> — {{ m.phone }} — {{ m.company }}
                </li>
            {% empty %}
                <li class="list-group-item text-muted">No members added yet</li>
            {% endfor %}
        </ul>

        <form method="POST">
    {% csrf_token %}

    <label class="form-label fw-bold">Member Name</label>
    <input type="text" name="name" class="form-control" required>

    <label class="form-label fw-bold mt-3">Phone</label>
    <input type="text" name="phone" class="form-control">

    <label class="form-label fw-bold mt-3">Company</label>
    <input type="text" name="company" class="form-control">

    <label class="form-label fw-bold mt-3">Email</label>
    <input type="email" name="email" class="form-control">

    <label class="form-label fw-bold mt-3">Message</label>
    <textarea name="message" class="form-control" rows="2"></textarea>

    <label class="form-label fw-bold mt-3">Category</label>
    <select name="category" class="form-control" required>
        <option value="student">Student</option>
        <option value="business">Business Owner</option>
        <option value="investor">Investor</option>
        <option value="vendor">Vendor</option>
        <option value="job">Job Seeker</option>
    </select>

    <label class="form-label fw-bold mt-3">Lead Score</label>
    <select name="lead_score" class="form-control" required>
        <option value="hot">Hot 🔥</option>
        <option value="warm">Warm</option>
        <option value="cold">Cold</option>
    </select>

    <button class="btn btn-primary w-100 mt-3">Add Member</button>
</form>


        <a href="{% url 'thanks' %}" class="btn btn-success w-100 mt-3">
            Finish & Show on TV
        </a>

        <a href="{% url 'entry-mode' %}" class="btn btn-danger w-100 mt-3">
            Cancel Group
        </a>

    </div>
</div>

</body>
</html>
